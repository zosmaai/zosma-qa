name: QA

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch on new pushes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Build packages ──────────────────────────────────────────────────────────
  build:
    name: Build packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Type-check all packages
        run: pnpm typecheck

      # Cache the built packages for the test jobs
      - uses: actions/cache/save@v4
        with:
          path: |
            packages/*/dist
            node_modules
            packages/*/node_modules
            examples/*/node_modules
          key: build-${{ github.sha }}

  # ─── Root tests (user's own tests/ folder) ───────────────────────────────────
  test-root:
    name: Root tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: actions/cache/restore@v4
        with:
          path: |
            packages/*/dist
            node_modules
            packages/*/node_modules
            examples/*/node_modules
          key: build-${{ github.sha }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run tests
        run: pnpm test
        env:
          CI: true
          BASE_URL: ${{ vars.BASE_URL || 'http://localhost:3000' }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-root
          path: playwright-report/
          retention-days: 30

  # ─── Example tests (zosma.ai) ────────────────────────────────────────────────
  test-examples:
    name: Example tests (zosma.ai)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: actions/cache/restore@v4
        with:
          path: |
            packages/*/dist
            node_modules
            packages/*/node_modules
            examples/*/node_modules
          key: build-${{ github.sha }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run example tests (zosma.ai)
        run: pnpm test:examples
        env:
          CI: true

      - name: Upload example Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-examples
          path: examples/zosma-ai/playwright-report/
          retention-days: 30
